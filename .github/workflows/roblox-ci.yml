name: Roblox CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  ROJO_VERSION: "7.6.1"
  LUNE_VERSION: "0.10.4"

jobs:
  validate:
    name: Validate Rojo Project
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rojo
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer ${{ github.token }}" }
          $release = Invoke-RestMethod "https://api.github.com/repos/rojo-rbx/rojo/releases/tags/v$env:ROJO_VERSION" -Headers $headers
          $asset = $release.assets | Where-Object {
            $_.name -match "windows" -and $_.name -match "x86_64" -and $_.name -match "\.zip$"
          } | Select-Object -First 1
          if (-not $asset) { throw "Could not find Rojo Windows x86_64 zip asset." }

          New-Item -ItemType Directory -Force tools/bin | Out-Null
          Invoke-WebRequest $asset.browser_download_url -OutFile tools/bin/rojo.zip
          Expand-Archive tools/bin/rojo.zip -DestinationPath tools/bin/rojo -Force
          $rojo = Get-ChildItem tools/bin/rojo -Recurse -Filter rojo.exe | Select-Object -First 1
          if (-not $rojo) { throw "rojo.exe was not found after extraction." }
          "ROJO=$($rojo.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Selene
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer ${{ github.token }}" }
          $release = Invoke-RestMethod "https://api.github.com/repos/Kampfkarren/selene/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object {
            $_.name -match "^selene-" -and $_.name -match "windows" -and $_.name -match "\.zip$"
          } | Select-Object -First 1
          if (-not $asset) { throw "Could not find Selene Windows zip asset." }

          Invoke-WebRequest $asset.browser_download_url -OutFile tools/bin/selene.zip
          Expand-Archive tools/bin/selene.zip -DestinationPath tools/bin/selene -Force
          $selene = Get-ChildItem tools/bin/selene -Recurse -Filter selene.exe | Select-Object -First 1
          if (-not $selene) { throw "selene.exe was not found after extraction." }
          "SELENE=$($selene.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Lune
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer ${{ github.token }}" }
          $release = Invoke-RestMethod "https://api.github.com/repos/lune-org/lune/releases/tags/v$env:LUNE_VERSION" -Headers $headers
          $asset = $release.assets | Where-Object {
            $_.name -match "windows" -and $_.name -match "x86_64" -and $_.name -match "\.zip$"
          } | Select-Object -First 1
          if (-not $asset) { throw "Could not find Lune Windows x86_64 zip asset." }

          Invoke-WebRequest $asset.browser_download_url -OutFile tools/bin/lune.zip
          Expand-Archive tools/bin/lune.zip -DestinationPath tools/bin/lune -Force
          $lune = Get-ChildItem tools/bin/lune -Recurse -Filter lune.exe | Select-Object -First 1
          if (-not $lune) { throw "lune.exe was not found after extraction." }
          "LUNE=$($lune.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Lint Luau with Selene
        shell: pwsh
        run: |
          & "$env:SELENE" src --allow-warnings

      - name: Run Luau unit tests
        shell: pwsh
        run: |
          & "$env:LUNE" run tests/unit/run.luau

      - name: Build Roblox place
        shell: pwsh
        run: |
          & "$env:ROJO" build default.project.json -o build_check.rbxl

      - name: Generate sourcemap
        shell: pwsh
        run: |
          & "$env:ROJO" sourcemap default.project.json --include-non-scripts -o sourcemap.json

      - name: Compare managed non-Workspace structure
        if: hashFiles('DemonBlade2.rbxl', 'DemonBlade2 update*.rbxl') != ''
        shell: pwsh
        run: |
          & "$env:LUNE" run tools/compare_non_script_structure.luau

      - name: Verify key service properties
        if: hashFiles('DemonBlade2.rbxl', 'DemonBlade2 update*.rbxl') != ''
        shell: pwsh
        run: |
          & "$env:LUNE" run tools/compare_key_service_properties.luau

      - name: Upload code validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemonBlade2-code-build
          path: build_check.rbxl
          if-no-files-found: error
